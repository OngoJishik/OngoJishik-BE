name: Spring EC2 자동 배포

# 언제 실행할지
on:
  push:
    branches:
      - main   # main 브랜치 push 시 실행

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 깃허브 코드 가져오기
      - name: 레포지토리 가져오기
        uses: actions/checkout@v4

      # Java 17 설치
      - name: JDK 17 설치
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # gradlew 실행 권한 부여
      - name: gradlew 권한 부여
        run: chmod +x gradlew

      # Spring 프로젝트 build
      - name: 프로젝트 빌드
        run: ./gradlew build -x test

      # EC2 서버 접속 후 배포
      - name: EC2 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            # 프로젝트 폴더 이동
            cd ~/OngoJisik-BE

            # 최신 코드 pull
            git pull origin main

            # gradlew 권한 부여
            chmod +x gradlew

            # 서버 내부에서 다시 build
            ./gradlew build -x test --no-daemon

            # Spring 서버 실행
            nohup java -jar build/libs/OngoJisik-BE-0.0.1-SNAPSHOT.jar > output.log 2>&1 </dev/null &
