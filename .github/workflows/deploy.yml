name: Spring EC2 자동 배포

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: EC2 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e

            cd /home/ubuntu/OngoJishik-BE

            git fetch origin main
            git switch main
            git reset --hard origin/main

            echo "배포 커밋 확인"
            git log -1 --oneline

            chmod +x gradlew
            ./gradlew clean bootJar -x test --no-daemon

            sudo systemctl restart ongojisik
            sudo systemctl status ongojisik --no-pager

            echo "애플리케이션 기동 확인"
            for i in {1..30}; do
              if curl -fsS http://localhost:8080/swagger-ui.html > /dev/null; then
                echo "애플리케이션 기동 성공"
                exit 0
              fi
              sleep 5
            done

            echo "애플리케이션 기동 실패 로그"
            sudo journalctl -u ongojisik -n 100 --no-pager
            exit 1
